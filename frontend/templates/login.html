<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Battery Recycling AI System</title>
  <meta name="description" content="AI-powered battery recycling system — log in to analyze batteries and view material recovery data.">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">♻️</div>
        <h1>BatteryAI</h1>
        <p>AI‑Based Battery Recycling System</p>
      </div>

      <div class="glass-card auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to access the recycling dashboard</p>

        <div id="alert-box" class="hidden"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email" id="email" name="email"
              class="form-control"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password" id="password" name="password"
              class="form-control"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
          </div>
          <button type="submit" class="btn btn-primary" id="submit-btn">
            <span>Sign In</span>
          </button>
        </form>

        <p class="auth-footer">
          Don't have an account?
          <a href="/register">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const alertBox = document.getElementById('alert-box');
    const submitBtn = document.getElementById('submit-btn');

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard';
    }

    function showAlert(type, msg) {
      alertBox.className = `alert alert-${type}`;
      alertBox.innerHTML = `<span>${type === 'error' ? '⚠️' : '✅'}</span> ${msg}`;
      alertBox.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span>Signing in…</span>';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert('error', data.error || 'Login failed');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Sign In</span>';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showAlert('success', 'Login successful! Redirecting…');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } catch (err) {
        showAlert('error', 'Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Sign In</span>';
      }
    });
  </script>
</body>
</html>
